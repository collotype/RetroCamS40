name: Build Simple App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Clean build folder
        run: rm -rf build

      - name: Build app without signing
        run: |
          xcodebuild \
            -project RetroCamS40.xcodeproj \
            -scheme RetroCamS40 \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package app
        run: |
          mkdir -p output
          APP_PATH=$(find build -type d -name "RetroCamS40.app" | head -n 1)
          echo "APP_PATH=$APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r ../../../../output/RetroCamS40.app.zip RetroCamS40.app

      - name: Show build result
        run: |
          ls -la output || true
          find build -name "*.app" || true

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: RetroCamS40-app
          path: output/RetroCamS40.app.zip
          if-no-files-found: error
